version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: arrdb
    environment:
      POSTGRES_USER: arruser
      POSTGRES_PASSWORD: arrpass
      POSTGRES_DB: arrdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arruser -d arrdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
